<!DOCTYPE html>
<html>
<head>
  <title>Redirect</title>
  <script>
    const base = "http://10.40.136.250:8000";

    const repo = "/mroapp";

    let path = window.location.pathname;

    // Remove repo prefix
    if (path.startsWith(repo)) {
      path = path.slice(repo.length);
    }

    // Ensure path starts correctly
    if (path === "" || path === "/") {
      path = "";
    }

    const finalUrl = base + path + window.location.search + window.location.hash;

    window.location.replace(finalUrl);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
