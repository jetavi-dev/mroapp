<!DOCTYPE html>
<html>
<head>
  <title>Redirect</title>
  <script>
    const base = "http://10.40.136.250:8000";

    // Build clean target URL (ONLY query + hash)
    const target = base + window.location.search + window.location.hash;

    // Open fresh navigation (new tab)
    window.open(target, "_self");
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
