<!DOCTYPE html>
<html>
<head>
  <title>Redirect</title>
  <script>
    const base = "http://10.40.136.250:8000";

    // Take full path and remove the repo part everywhere
    let path = window.location.pathname;

    // Force remove ALL occurrences of /mroapp at the start
    path = path.replace(/^\/mroapp/, "");

    // Clean double slashes
    if (path === "/") {
      path = "";
    }

    const finalUrl = base + path + window.location.search + window.location.hash;

    window.location.replace(finalUrl);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
